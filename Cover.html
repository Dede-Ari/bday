<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Baby</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('cover.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Great Vibes', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .btn {
      position: relative;
      padding: 18px 50px;
      font-size: 22px;
      font-family: 'Pacifico', cursive;
      color: #fff;
      background: linear-gradient(135deg, #ff758c, #ff7eb3, #ff4b2b);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 25px rgba(255, 120, 150, 0.8);
      text-align: center;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(255, 120, 150, 1);
    }

    .btn::before, .btn::after {
      content: "❤";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: #fff;
      animation: heartbeat 1.5s infinite;
    }

    .btn::before { left: 15px; }
    .btn::after { right: 15px; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: translateY(-50%) scale(1); }
      50% { transform: translateY(-50%) scale(1.3); }
    }

    /* Responsive untuk layar kecil */
    @media (max-width: 600px) {
      .btn {
        padding: 14px 30px;
        font-size: 18px;
      }
      .btn::before, .btn::after {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <button class="btn" onclick="location.href='index.html'">Pencetttt babyyyy 💖</button>
</body>
</html>
